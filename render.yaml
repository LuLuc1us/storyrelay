services:
  - type: web
    name: story-relay
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.2-3b-instruct:free
      - key: APP_PUBLIC_URL
        value: https://story-relay.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
