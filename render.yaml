services:
  - type: web
    name: story-relay
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_FALLBACK_PROVIDERS
        value: openrouter,groq,gemini,openai
      - key: APP_PUBLIC_URL
        value: https://story-relay.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_ROOMS_TABLE
        value: story_rooms
